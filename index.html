    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="./css/globla.css">
    <title>Happy anniversay 4th</title>

</head>

<body>
    <!-- phase 1 -->
    <div class="second-bg">
        <img class="flowerFrame" src="./img/flower/flower_001.png">
        <img class="flowerFrame" src="./img/flower/flower_001.png">
        <img class="flowerFrame" src="./img/flower/flower_001.png">
        <img class="flowerFrame" src="./img/flower/flower_001.png">

            <img id="pigoen01Frame" src="./img/pigoenL/pigoenL_001.png" alt="">

        <div class="ribbon">
            <img src="./img/ribbon-removebg-preview.png" alt="">

        </div>

        <div class="envelope">
            <div class="envelope-lid"></div>
            <div class="envelope-lid envelope-lid-secondary"></div>
            <div class="card-wrapper">
                <div class="card">
                    <div class="card-cover">
                        <div class="card-side card-side-primary">
                            <h1 class="card-title">
                                <span class="card-title-secondary">Happy</span>
                                <span class="card-title-third">4th</span>
                                <span class="card-title-main">Anniversary<span
                                        class="card-title-apostrophe">❤️</span></span>
                                <span class="card-title-secondary">05.03</span>
                            </h1>
                        </div>
                        <div class="card-side card-side-secondary">
                            <div class="polaroid" style="left:10px; top:20px; transform: rotate(4deg);">
                                <img src="./img/weImage/we1.png" alt="thumb2">
                            </div>
                            <div class="polaroid" style="left:100px; top:20px; transform: rotate(4deg);">
                                <img src="./img/weImage/we2.png" alt="thumb2">
                            </div>
                            <div style="position: absolute;left:50px">
                                <span style=" color: #6b2f4f; "><span>❤️</span> 05.03 <span>❤️</span></span>
                            </div>
                            <div class="polaroid" style="left:10px; top:150px; transform: rotate(4deg);">
                                <img src="./img/weImage/we3.png" alt="thumb2">
                            </div>
                            <div class="polaroid" style="left:100px; top:150px; transform: rotate(4deg);">
                                <img src="./img/weImage/we4.png" alt="thumb2">
                            </div>
                            <!-- image -->

                        </div>
                    </div>
                    <div class="card-body">
                        <p id="letter-text" class="typing"></p>

                    </div>
                </div>
            </div>
            <div id="btnHeart" class="heart-seal">
                <img src="./img/heart.png" alt="">
            </div>
            <div id="heart-seal-bump" class="heart-seal-bump" style="z-index: 2;display: none;">
                <img src="./img/heart.png" alt="">
            </div>
        </div>



        <div class="pigoen02">
            <img id="pigoen02Frame" src="./img/pigoenR/pigoenR_001.png" alt="">
        </div>

    </div>
    <!-- <div id="" class="heart-seal"> <img src="./img/heart.png" alt=""></div> -->
    <div id="switchPhase"
        style="width: auto; height: auto; position: absolute; bottom: 40px; right: 25px; border: solid 2px; border-radius: 5px; text-align: center;padding: 2px;display: none;z-index: 50 !important;">
        nhấn🎂</div>

    <script src="./animation/beginAnimation.js">

    </script>
    <script src="./animation/flower.js">

    <script src="./animation/pigoen.js">
